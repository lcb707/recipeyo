uwsgi_cache_path /tmp/nginx/cache levels=1:2 keys_zone=uwsgi_zone:100m inactive=1440m;

upstream app-server {
    server dj-server60000:3031;
}

upstream frontend {
    server frontend:40001;
}

# 1. HTTP(80)로 접속하면 HTTPS(443)로 자동 리다이렉트
server {
    listen 31000;
    listen [::]:31000;
    server_name recipeyo.duckdns.org;
    
    return 301 https://$host$request_uri;
}

# 2. HTTPS(443) 통신 설정 
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name recipeyo.duckdns.org;

    # SSL 인증서 경로 설정
    ssl_certificate /etc/letsencrypt/live/recipeyo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recipeyo.duckdns.org/privkey.pem;

    # SSL 보안 강화 설정 
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    charset utf-8;
    client_max_body_size 75M;

    
    # API 요청은 백엔드(Django/uWSGI)로
    location /api/ {
        uwsgi_pass  app-server;
        include     uwsgi_params;
    }

    # 정적/미디어는 백엔드 경로 유지
    location /static/ {
        alias /usr/src/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /usr/src/app/outgoing/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Next.js HMR WebSocket (dev 모드)
    location /_next/webpack-hmr {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Next.js 정적/청크
    location /_next/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 그 외 모든 요청은 프론트엔드(Next.js)로
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt { allow all; log_not_found off; access_log off; }
}