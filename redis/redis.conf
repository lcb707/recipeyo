# 네트워크 설정
bind 0.0.0.0
port 6379

# 보안 설정
# .env에 설정한 값과 동일하게 직접 적거나, 
# 보안을 위해 이 파일 자체를 보호해야 합니다.

# 메모리 관리 (Django/Celery 환경 최적화)
# 메모리가 가득 찼을 때 가장 오래된 데이터를 지우는 정책 (캐시용)
maxmemory 512mb
maxmemory-policy allkeys-lru

# 1. RDB 설정 (스냅샷 주기)
# 900초 동안 1개 이상 변경 시 저장
# 300초 동안 10개 이상 변경 시 저장
# 60초 동안 10,000개 이상 변경 시 저장
save 900 1
save 300 10
save 60 10000

# 2. AOF 설정 (가장 중요)
appendonly yes
appendfilename "appendonly.aof"
# 매초마다 디스크에 기록 (성능과 안전의 타협점)
appendfsync everysec
aof-load-truncated yes

# 3. AOF 재작성(Rewrite) 설정
# AOF 파일이 너무 커지면 최신 상태로 압축합니다.
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 4. 하이브리드 저장 설정 (Redis 4.0+ 필수 권장)
# AOF 파일 앞부분에 RDB 스냅샷을 넣어 복구 속도를 비약적으로 높입니다.
aof-use-rdb-preamble yes

# 성능 및 로그 설정
loglevel notice
databases 16