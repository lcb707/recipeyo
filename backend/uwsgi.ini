# uwsgi.ini
[uwsgi]

# Django wsgi entrypoint
chdir = /usr/src/app
module = config.wsgi:application

# TCP 소켓 바인딩 (nginx upstream용)
socket = :3031

# 프로세스/스레드 설정
master = true
processes = 2
threads = 1

# Django settings
env = DJANGO_SETTINGS_MODULE=config.settings

# 자동정리
vacuum = true
enable-threads = true

# (선택) 로그 설정
# logto = /var/log/uwsgi/uwsgi.log
# log-reopen = true

lazy-apps = true  # 워커가 실제로 뜰 때 개별적으로 DB 연결을 맺게 하여 안정성을 확보